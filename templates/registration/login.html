{% extends "base.html" %}
{% block title %}Iniciar sesión – Heladería{% endblock %}
{% block whatsapp %}{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="card border-0 shadow-sm rounded-3" style="width:100%;max-width:400px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem">🍦</div>
        <h4 class="fw-bold mt-2">Panel interno</h4>
        <p class="text-muted small">Solo para personal autorizado</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold">Usuario</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Contraseña</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-turquesa w-100 py-2 fw-bold">
          Ingresar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
